<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>公司画像搜索组件 Demo</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="input-pane" aria-labelledby="page-title">
        <div class="title-row">
          <div>
            <h1 id="page-title">公司画像搜索</h1>
            <p>输入公司信息，生成供人才匹配智能体使用的结构化结果。</p>
          </div>
          <span class="status-pill" id="statusPill">待生成</span>
        </div>

        <form id="profileForm" class="form-grid">
          <label>
            公司名称
            <input id="companyName" name="company_name" placeholder="例如：阿里云" autocomplete="organization" required />
          </label>

          <label>
            公司官网
            <input id="companyWebsite" name="company_website" placeholder="https://example.com" autocomplete="url" />
          </label>

          <label class="full-row">
            岗位需求文本
            <textarea id="jobDescription" name="job_description" rows="8" placeholder="粘贴岗位 JD，例如：Python 后端、搜索推荐、向量检索、AI Agent 等"></textarea>
          </label>

          <label>
            检索轮次
            <select id="maxIterations" name="max_iterations">
              <option value="1" selected>快速：1 轮</option>
              <option value="3">补充：最多 3 轮</option>
            </select>
          </label>

          <div class="actions full-row">
            <button type="submit" id="submitBtn">生成画像</button>
            <button type="button" id="clearBtn" class="secondary">清空结果</button>
          </div>
        </form>
      </section>

      <section class="result-pane" aria-live="polite">
        <div class="result-tabs">
          <button type="button" class="tab active" data-tab="overview">画像</button>
          <button type="button" class="tab" data-tab="json">原始结果</button>
          <button type="button" class="tab" data-tab="evidence">证据</button>
        </div>

        <div id="overviewPanel" class="panel active"></div>
        <pre id="jsonPanel" class="panel json-panel"></pre>
        <div id="evidencePanel" class="panel evidence-panel"></div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
